<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendario — GestionProyectos</title>
  <meta name="theme-color" content="#0a0b0f" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/static/icons/icon.svg" />
  <link rel="stylesheet" href="/static/css/styles.css" />
  <style>
    .calendar-container {
      background: var(--bg-card);
      border: 1px solid var(--border-medium);
      border-radius: var(--radius-lg);
      padding: 20px;
    }
    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
    }
    .calendar-day-header {
      text-align: center;
      font-weight: 700;
      color: var(--text-muted);
      font-size: 0.8125rem;
      text-transform: uppercase;
      padding-bottom: 10px;
    }
    .calendar-day {
      min-height: 120px;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .calendar-day.today {
      border-color: var(--brand-primary);
      background: rgba(99,102,241,0.05);
    }
    .calendar-day-number {
      font-weight: 700;
      font-size: 0.875rem;
      color: var(--text-secondary);
      align-self: flex-end;
    }
    .calendar-day.today .calendar-day-number {
      color: var(--brand-primary);
    }
    .calendar-event {
      font-size: 0.75rem;
      padding: 4px 6px;
      border-radius: 4px;
      color: #fff;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
    }
    .event-pendiente  { background: #fbbf24; color: #000; }
    .event-desarrollo { background: #818cf8; }
    .event-revision   { background: #22d3ee; color: #000; }
    .event-entregado  { background: #34d399; color: #000; }
  </style>
</head>
<body>
  <div class="bg-animated"></div>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="/dashboard" class="navbar-brand">
      <div class="navbar-logo">🔬</div>
      <span>GestionProyectos</span>
    </a>
    <div class="navbar-nav">
      <a href="/dashboard" class="nav-link">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a href="/calendario" class="nav-link active">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Calendario
      </a>
      <a href="/reportes" class="nav-link">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        Reportes
      </a>
      <a href="/clientes" class="nav-link">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Clientes
      </a>
      <a href="/nuevo" class="nav-link">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nuevo
      </a>
    </div>
  </nav>

  <main class="container page-content">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">
      <div>
        <h1 style="margin-bottom:4px;">Calendario de Entregas</h1>
        <p>Visualiza todos los plazos límite de este mes.</p>
      </div>
    </div>

    <div class="calendar-container">
      <div class="calendar-header">
        <button class="btn btn-secondary btn-sm" id="prev-month">◄ Anterior</button>
        <h2 id="month-year-display" style="margin:0;"></h2>
        <button class="btn btn-secondary btn-sm" id="next-month">Siguiente ►</button>
      </div>
      
      <div class="calendar-grid" id="calendar-days-header">
        <div class="calendar-day-header">Dom</div>
        <div class="calendar-day-header">Lun</div>
        <div class="calendar-day-header">Mar</div>
        <div class="calendar-day-header">Mié</div>
        <div class="calendar-day-header">Jue</div>
        <div class="calendar-day-header">Vie</div>
        <div class="calendar-day-header">Sáb</div>
      </div>
      <div class="calendar-grid" id="calendar-grid">
        <!-- Renderizado por JS -->
      </div>
    </div>
  </main>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/calendario.js"></script>
</body>
</html>
