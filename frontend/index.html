<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GestionProyectos — Acceso</title>
  <meta name="description" content="Panel de gestión interna de proyectos académicos e investigación científica." />
  <meta name="theme-color" content="#0a0b0f" />

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/static/icons/icon.svg" />

  <!-- Estilos -->
  <link rel="stylesheet" href="/static/css/styles.css" />
</head>
<body>
  <div class="bg-animated"></div>

  <main class="login-page">
    <div class="glass-card login-card fade-in">
      <!-- Logo -->
      <div class="login-logo">🔬</div>

      <h1 class="login-title">
        <span class="text-gradient">GestionProyectos</span>
      </h1>
      <p class="login-subtitle">Panel de administración interno</p>

      <!-- Formulario de Login -->
      <form class="login-form" id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="username">Usuario</label>
          <input
            type="text"
            id="username"
            name="username"
            class="form-control"
            placeholder="admin"
            autocomplete="username"
            required
          />
          <span class="form-error" id="username-error">Ingresa tu usuario</span>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <div style="position:relative;">
            <input
              type="password"
              id="password"
              name="password"
              class="form-control"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            />
            <button
              type="button"
              id="toggle-pass"
              aria-label="Mostrar/ocultar contraseña"
              style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:18px;"
            >👁</button>
          </div>
          <span class="form-error" id="password-error">Ingresa tu contraseña</span>
        </div>

        <!-- Error general -->
        <div id="login-error" class="hidden" style="
          padding:10px 14px;
          background:rgba(239,68,68,0.1);
          border:1px solid rgba(239,68,68,0.25);
          border-radius:var(--radius-md);
          color:var(--brand-danger);
          font-size:0.875rem;
          text-align:center;
        ">
          Usuario o contraseña incorrectos
        </div>

        <button type="submit" id="submit-btn" class="btn btn-primary btn-full btn-lg" style="margin-top:8px;">
          <span id="btn-text">Ingresar</span>
          <span id="btn-spinner" class="spinner hidden"></span>
        </button>
      </form>

      <!-- Footer -->
      <p style="text-align:center;margin-top:28px;font-size:0.75rem;color:var(--text-muted);">
        Acceso exclusivo para administrador ·
        <a href="/docs" target="_blank" style="color:var(--brand-primary);text-decoration:none;">API Docs</a>
      </p>
    </div>
  </main>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container"></div>

  <script src="/static/js/auth.js"></script>
  <script src="/static/js/api.js"></script>
  <script>
    // Si ya hay token válido, redirigir al dashboard
    if (localStorage.getItem('token')) {
      window.location.href = '/dashboard';
    }

    // Toggle password visibility
    document.getElementById('toggle-pass').addEventListener('click', () => {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
    });

    // Submit handler
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const loginError = document.getElementById('login-error');
      const btnText = document.getElementById('btn-text');
      const btnSpinner = document.getElementById('btn-spinner');
      const submitBtn = document.getElementById('submit-btn');

      // Validación básica
      loginError.classList.add('hidden');
      let valid = true;

      if (!username) {
        document.getElementById('username').classList.add('is-error');
        valid = false;
      } else {
        document.getElementById('username').classList.remove('is-error');
      }
      if (!password) {
        document.getElementById('password').classList.add('is-error');
        valid = false;
      } else {
        document.getElementById('password').classList.remove('is-error');
      }
      if (!valid) return;

      // Mostrar spinner
      btnText.textContent = 'Verificando...';
      btnSpinner.classList.remove('hidden');
      submitBtn.disabled = true;

      try {
        const data = await api.login(username, password);
        localStorage.setItem('token', data.access_token);
        showToast('¡Bienvenido! Redirigiendo...', 'success');
        setTimeout(() => { window.location.href = '/dashboard'; }, 800);
      } catch (err) {
        loginError.classList.remove('hidden');
        btnText.textContent = 'Ingresar';
        btnSpinner.classList.add('hidden');
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
